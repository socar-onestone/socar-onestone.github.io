name: Check korean grammar on pull request comment

on:
  issue_comment:
    types:
      - created

jobs:
  grammar_check:
    runs-on: ubuntu-latest
    steps:
    - name: "맞춤법 검사"
      uses: onestone9900/korean-grammar-action@v0.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PASSPORT_KEY: ${{ secrets.PASSPORT_KEY }}
